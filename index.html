<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Biome · Taiga</title>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#d8e5e2",
                        "surface-tint": "#4a6453",
                        "on-secondary": "#e9feee",
                        "error-dim": "#4e0309",
                        "error": "#9f403d",
                        "surface-container-low": "#eff5f2",
                        "on-error": "#fff7f6",
                        "tertiary-dim": "#4b5557",
                        "on-tertiary-fixed-variant": "#5e686b",
                        "secondary-container": "#d3e8d8",
                        "primary-container": "#cdead3",
                        "secondary": "#516357",
                        "background": "#f7faf8",
                        "secondary-dim": "#45574c",
                        "on-tertiary-fixed": "#424b4e",
                        "secondary-fixed-dim": "#c5daca",
                        "outline": "#717d7b",
                        "on-secondary-container": "#43564a",
                        "primary": "#4a6453",
                        "secondary-fixed": "#d3e8d8",
                        "surface-dim": "#cdddda",
                        "tertiary-fixed-dim": "#dde7ea",
                        "error-container": "#fe8983",
                        "surface-variant": "#d8e5e2",
                        "tertiary": "#576163",
                        "inverse-surface": "#0b0f0e",
                        "primary-fixed": "#cdead3",
                        "surface": "#f7faf8",
                        "surface-bright": "#f7faf8",
                        "on-secondary-fixed-variant": "#4d6054",
                        "on-tertiary-container": "#545d60",
                        "tertiary-fixed": "#ebf5f8",
                        "on-tertiary": "#f1fbfe",
                        "on-primary-fixed": "#2c4535",
                        "tertiary-container": "#ebf5f8",
                        "surface-container": "#e8f0ed",
                        "primary-dim": "#3f5847",
                        "surface-container-high": "#e0eae7",
                        "inverse-on-surface": "#9a9e9c",
                        "on-secondary-fixed": "#314338",
                        "outline-variant": "#a8b5b2",
                        "primary-fixed-dim": "#bfdcc5",
                        "on-primary": "#e2ffe8",
                        "on-error-container": "#752121",
                        "on-surface": "#293533",
                        "surface-container-lowest": "#fbfdfc",
                        "inverse-primary": "#e0fee7",
                        "on-surface-variant": "#55625f",
                        "on-background": "#293533",
                        "on-primary-fixed-variant": "#486150",
                        "on-primary-container": "#3e5746"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "serif-elegant": ["Playfair Display", "serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        .scale-98-on-click:active {
            transform: scale(0.98);
        }

        .glass-panel {
            background: rgba(251, 253, 252, 0.85);
            backdrop-filter: blur(20px);
        }

        .primary-gradient {
            background: linear-gradient(145deg, #4a6453, #3f5847);
        }

        /* Sidebar Collapsible Logic */
        #sidebar {
            transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            width: 72px !important;
        }

        #sidebar.collapsed .sidebar-content-full,
        #sidebar.collapsed .sidebar-item-text,
        #sidebar.collapsed .new-chat-btn-text,
        #sidebar.collapsed .sidebar-header-title {
            display: none !important;
        }

        #sidebar.collapsed .sidebar-item-padding,
        #sidebar.collapsed .sidebar-header-container,
        #sidebar.collapsed .new-chat-btn {
            justify-content: center !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        #sidebar.collapsed .new-chat-btn {
            width: 44px !important;
            margin-left: auto !important;
            margin-right: auto !important;
        }

        .mindmap-grid {
            background-image: radial-gradient(#d8e5e2 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Syntax highlighting */
        .markdown-body pre {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #e2e8f0;
        }

        .syntax-keyword {
            color: #8e624c;
            font-weight: 600;
        }

        .syntax-string {
            color: #505f76;
        }

        .syntax-comment {
            color: #9a9e9c;
            font-style: italic;
        }

        .syntax-function {
            color: #4a6453;
        }

        .msg-enter {
            animation: msgIn 0.3s ease-out;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .floating-node {
            animation: float 4s ease-in-out infinite;
        }

        .floating-node-delayed {
            animation: float 4s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes subtleSlideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes subtleSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-slide-down {
            animation: subtleSlideDown 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .anim-slide-up {
            animation: subtleSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes subtleProgress {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(200%);
            }
        }

        .anim-progress-bar {
            animation: subtleProgress 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Ensure inputs look good */
        input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body
    class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container antialiased h-screen overflow-hidden">

    <div id="splash-screen"
        class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#fbfdfc] transition-opacity duration-1000 ease-in-out">
        <div class="flex items-center space-x-4">
            <div class="w-14 h-14 rounded-2xl bg-[#4a6453] flex items-center justify-center text-white shadow-xl">
                <span class="material-symbols-outlined text-3xl">filter_vintage</span>
            </div>
            <div class="flex flex-col items-start">
                <h1 class="text-5xl font-headline font-extrabold text-[#3e5746] tracking-tighter leading-none">Taiga</h1>
                <span class="text-[10px] font-label font-bold uppercase tracking-[0.25em] text-[#717d7b] mt-1.5">Biome · v1</span>
            </div>
        </div>
        <div class="mt-12 flex flex-col items-center">
            <div class="w-40 h-1 bg-[#e0eae7] rounded-full overflow-hidden relative">
                <div class="absolute top-0 left-0 h-full bg-[#4a6453] rounded-full anim-progress-bar w-1/2"></div>
            </div>
            <p class="mt-4 text-[10px] uppercase tracking-[0.3em] font-label text-[#717d7b] font-bold">Starting your workspace</p>
        </div>
    </div>

    <div id="app"
        class="w-full h-full relative z-10 transition-opacity duration-1000 will-change-transform flex overflow-hidden opacity-0">
    </div>
    <script type="module" src="/src/init.js"></script>
</body>

</html>
