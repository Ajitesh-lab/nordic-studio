<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Project Arboretum</title>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#d8e5e2",
                        "surface-tint": "#4a6453",
                        "on-secondary": "#e9feee",
                        "error-dim": "#4e0309",
                        "error": "#9f403d",
                        "surface-container-low": "#eff5f2",
                        "on-error": "#fff7f6",
                        "tertiary-dim": "#4b5557",
                        "on-tertiary-fixed-variant": "#5e686b",
                        "secondary-container": "#d3e8d8",
                        "primary-container": "#cdead3",
                        "secondary": "#516357",
                        "background": "#f7faf8",
                        "secondary-dim": "#45574c",
                        "on-tertiary-fixed": "#424b4e",
                        "secondary-fixed-dim": "#c5daca",
                        "outline": "#717d7b",
                        "on-secondary-container": "#43564a",
                        "primary": "#4a6453",
                        "secondary-fixed": "#d3e8d8",
                        "surface-dim": "#cdddda",
                        "tertiary-fixed-dim": "#dde7ea",
                        "error-container": "#fe8983",
                        "surface-variant": "#d8e5e2",
                        "tertiary": "#576163",
                        "inverse-surface": "#0b0f0e",
                        "primary-fixed": "#cdead3",
                        "surface": "#f7faf8",
                        "surface-bright": "#f7faf8",
                        "on-secondary-fixed-variant": "#4d6054",
                        "on-tertiary-container": "#545d60",
                        "tertiary-fixed": "#ebf5f8",
                        "on-tertiary": "#f1fbfe",
                        "on-primary-fixed": "#2c4535",
                        "tertiary-container": "#ebf5f8",
                        "surface-container": "#e8f0ed",
                        "primary-dim": "#3f5847",
                        "surface-container-high": "#e0eae7",
                        "inverse-on-surface": "#9a9e9c",
                        "on-secondary-fixed": "#314338",
                        "outline-variant": "#a8b5b2",
                        "primary-fixed-dim": "#bfdcc5",
                        "on-primary": "#e2ffe8",
                        "on-error-container": "#752121",
                        "on-surface": "#293533",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#e0fee7",
                        "on-surface-variant": "#55625f",
                        "on-background": "#293533",
                        "on-primary-fixed-variant": "#486150",
                        "on-primary-container": "#3e5746"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .scale-98-on-click:active { transform: scale(0.98); }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        .primary-gradient { background: linear-gradient(145deg, #4a6453, #3f5847); }

        /* Sidebar Collapsible Logic */
        #sidebar { transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar.collapsed { width: 72px; }
        #sidebar.collapsed .sidebar-content-full,
        #sidebar.collapsed .sidebar-item-text,
        #sidebar.collapsed .new-chat-btn-text,
        #sidebar.collapsed .sidebar-header-title { display: none; }
        #sidebar.collapsed .sidebar-item-padding,
        #sidebar.collapsed .sidebar-header-container,
        #sidebar.collapsed .new-chat-btn { justify-content: center; padding-left: 0; padding-right: 0; }
        #sidebar.collapsed .new-chat-btn { width: 44px; margin-left: auto; margin-right: auto; }

        .mindmap-grid {
            background-image: radial-gradient(#d8e5e2 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Syntax highlighting */
        .markdown-body pre { background: #f8fafc; padding: 12px; border-radius: 8px; overflow-x: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; line-height: 1.5; border: 1px solid #e2e8f0; }
        .syntax-keyword { color: #8e624c; font-weight: 600; }
        .syntax-string { color: #505f76; }
        .syntax-comment { color: #9a9e9c; font-style: italic; }
        .syntax-function { color: #4a6453; }
        .msg-enter { animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating-node { animation: float 4s ease-in-out infinite; }
        .floating-node-delayed { animation: float 4s ease-in-out infinite; animation-delay: 2s; }
        
        /* Ensure inputs look good */
        input:focus { outline: none; box-shadow: none; }
    </style>
</head>
<body class="bg-surface text-on-background font-body antialiased flex overflow-hidden h-screen">
  <div id="app" class="flex w-full h-full relative z-10 transition-colors duration-500 will-change-transform"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
